name: Skan sekretów

# Do wrzucenia w KAŻDYM z 9 repo jako .github/workflows/secret-scan.yml
# Cel: żeby historia z SunriseStudio (produkcyjny DATABASE_URL w śledzonym pliku)
#      już nigdy się nie powtórzyła.

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # pełna historia — inaczej skan widzi tylko ostatni commit

      - name: Skan sekretów (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml
